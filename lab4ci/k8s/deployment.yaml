apiVersion: apps/v1
kind: Deployment
metadata:
  name: sales-aggregator
  namespace: lab5
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sales-aggregator
  template:
    metadata:
      labels:
        app: sales-aggregator
    spec:
      containers:
        - name: sales-aggregator
          image: sales-aggregator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: sales-config
            - secretRef:
                name: sales-secret

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

livenessProbe:
  httpGet:
    path: /
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
envFrom:
  - configMapRef:
      name: sales-config
  - secretRef:
      name: sales-secret